<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:width="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>All Places</title>
</head>
<body>
<div id="modal-tag"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Card beginning -->
<div class="card mx-auto mt-5" style="max-width: 1000px;">
    <div class="card-header">
        All Places
    </div>
    <div class="card-body">
        <button type="button" onclick="AddPlace()" class="w-100 btn btn-md btn-outline-primary"
                sec:authorize="hasRole('ADMIN')"
                data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Add Place">
            <i class="bi bi-plus-circle-fill"></i>&nbsp;Add Place
        </button>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>BUILDING</th>
                <th>FLOOR</th>
                <th>ROOM</th>
                <th>SEAT</th>
                <th>OPERATIONS</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p:${places}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.building}"></td>
                <td th:text="${p.floor}"></td>
                <td th:text="${p.room}"></td>
                <td th:text="${p.seat}"></td>
                <td>
                    <a href="#" th:onclick="'javascript:Details('+${p.id}+');'" class="btn btn-info"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Details"><i
                            class="bi bi-info-circle"></i></a>

                    <a href="#" th:onclick="'javascript:Update('+${p.id}+');'" class="btn btn-warning"
                       sec:authorize="hasRole('ADMIN')"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Update"><i
                            class="bi bi-pencil"></i></a>

                    <a href="#" th:onclick="'javascript:Delete('+${p.id}+');'" class="btn btn-danger"
                       sec:authorize="hasRole('ADMIN')"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Delete"><i
                            class="bi bi-trash"></i></a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
    // Tooltip initialize
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

    function AddPlace() {
        console.log('Adding Place');
        $.ajax({
            url: '/place/add',
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem add place");
            }
        });
    }

    function Details(id) {
        $.ajax({
            url: '/place/'+ id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem on details!");
            }
        });
    }

    function Update(id) {
        $.ajax({
            url: '/place/update/'+id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem update");
            }
        });
    }

    function Delete(id) {
        if (!confirm("The selected place will be deleted! \nAre you sure?")) return;
        $.ajax({
            url: '/place/delete/' + id,
            type: 'delete',
            success: function (data) {
                //alert("Ok");
                window.location.replace("/place/all");
            },
            error: function (r) {
                alert("Delete place problem: " + r.responseText);
            }
        });
    }
</script>
</body>
</html>
