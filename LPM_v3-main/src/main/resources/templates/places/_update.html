<div class="modal fade" id="updatePlaceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Update Place</h5>
                <!-- Closing Button -->
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <form th:action="@{/place/update}" th:object="${place}" method="post">

                    <!-- Passes ID hiddenly -->
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Building</label>
                        <!-- Comes contents filled-up -->
                        <input type="text" th:field="*{building}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Floor</label>
                        <input type="text" th:field="*{floor}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Room</label>
                        <input type="text" th:field="*{room}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Seat</label>
                        <input type="text" th:field="*{seat}" class="form-control" required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
