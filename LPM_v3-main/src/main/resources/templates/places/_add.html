<div class="modal fade" id="addPlaceModal" tabindex="-1" aria-labelledby="addPlaceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addPlaceModalLabel">Add New Place</h5>
                <!-- Closing Button -->
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <form th:action="@{/place/add}" th:object="${place}" method="post">

                    <div class="mb-3">
                        <label for="building" class="form-label">Building</label>
                        <input type="text" th:field="*{building}" class="form-control" id="building" required>
                    </div>

                    <div class="mb-3">
                        <label for="floor" class="form-label">Floor</label>
                        <input type="text" th:field="*{floor}" class="form-control" id="floor" required>
                    </div>

                    <div class="mb-3">
                        <label for="room" class="form-label">Room</label>
                        <input type="text" th:field="*{room}" class="form-control" id="room" required>
                    </div>

                    <div class="mb-3">
                        <label for="seat" class="form-label">Seat</label>
                        <input type="text" th:field="*{seat}" class="form-control" id="seat" required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
