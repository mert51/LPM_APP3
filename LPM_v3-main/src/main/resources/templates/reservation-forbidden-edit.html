<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Action Not Permitted</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card border-warning mx-auto" style="max-width: 700px;">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Action Not Permitted</h4>
        </div>
        <div class="card-body">
            <p class="lead">You are not authorized to edit this reservation.</p>
            <p>This reservation belongs to another user and can only be modified by the account owner or an administrator.</p>
            <hr>
            <p>If you believe you should have access, please contact the system administrator with details.</p>
            <a href="/reservation/all" class="btn btn-secondary">Back to Reservations</a>
        </div>
    </div>
</div>
</body>
</html>
