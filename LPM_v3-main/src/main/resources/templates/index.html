<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LPM - Library Place Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .jumbotron {
            background-color: #007bff;
            color: white;
            padding: 2rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="container mt-5">

<div class="jumbotron text-center">
    <h1 class="display-5 fw-bold">Library Place Management (LPM)</h1>
    <p class="lead">Sakaya Universty Center Library</p>
</div>

<div class="row justify-content-center text-center">

    <div class="col-md-6" sec:authorize="!isAuthenticated()">
        <div class="card p-4 shadow-sm">
            <h4>Welcome to LPM!</h4>
            <p class="text-muted">Login to continue...</p>
            <div class="mt-3">
                <a th:href="@{/login}" class="btn btn-primary btn-lg w-100 mb-2">Login</a>
                <a th:href="@{/register}" class="btn btn-outline-secondary w-100">Sign Up</a>
            </div>
        </div>
    </div>

    <div class="col-md-8" sec:authorize="isAuthenticated()">
        <div class="card p-4 shadow-sm">
            <h4>Hello, <span sec:authentication="name" class="text-primary">Student</span>!</h4>
            <p>Where do you want to go?</p>

            <div class="d-grid gap-2 d-md-block mt-3">
                <a th:href="@{/place/all}" class="btn btn-outline-primary btn-lg m-1">Places</a>
                <a th:href="@{/reservation/all}" class="btn btn-outline-success btn-lg m-1">Reservations</a>

                <a th:href="@{/student/all}" class="btn btn-outline-danger btn-lg m-1" sec:authorize="hasRole('ADMIN')">Student Management</a>
            </div>

            <hr class="mt-4">

            <a th:href="@{/logout}" class="btn btn-sm btn-secondary">Logout</a>
        </div>
    </div>

</div>

<footer class="mt-5 text-center text-muted">
    <p><small>&copy; 2026 SWE 212 Project - Ahmet Oğan</small></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
