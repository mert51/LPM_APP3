<div class="modal fade" id="updateReservationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Reservation Update</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- ID'yi URL üzerinden gönderiyoruz -->
                <form th:action="@{/reservation/update/{id}(id=${reservation.id})}" th:object="${reservation}" method="post">

                    <!-- Student Selection (current student comes)-->
                    <div class="mb-3">
                        <label class="form-label">Student</label>
                        <select name="studentId" class="form-select" required>
                            <option th:each="s : ${student}"
                                    th:value="${s.id}"
                                    th:text="${s.name}"
                                    th:selected="${s.id} == ${reservation.studentDto.id}">
                            </option>
                        </select>
                    </div>

                    <!-- Place Selection (current place comes) -->
                    <div class="mb-3">
                        <label class="form-label">Place</label>
                        <select name="placeId" class="form-select" required>
                            <option th:each="p : ${place}"
                                    th:value="${p.id}"
                                    th:text="${p.building + ' - ' + p.room}"
                                    th:selected="${p.id} == ${reservation.placeDto.id}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="datetime-local" th:field="*{date}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">End Date</label>
                        <input type="datetime-local" th:field="*{duration}" class="form-control" required>
                    </div>

                    <!-- Güncelleme ekranında rezervasyonu iptal etme / durumu değiştirme imkanı -->
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select th:field="*{reserved}" class="form-select">
                            <option th:value="true">Reserved</option>
                            <option th:value="false">Available</option>
                        </select>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
