<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:width="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>All Reservations</title>
</head>
<body>
<div id="modal-tag"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Card beginning -->
<div class="card mx-auto mt-5" style="max-width: 1000px;">
    <div class="card-header">
        All Reservations
    </div>
    <div class="card-body">
        <button type="button" onclick="AddReservation()" class="w-100 btn btn-md btn-outline-primary"
                data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Add Customer">
            <i class="bi bi-person-plus-fill"></i>&nbsp;Add Reservation
        </button>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>STUDENT</th>
                <th>PLACE</th>
                <th>START DATE</th>
                <th>END DATE</th>
                <th>STATUS</th>
                <th>OPERATIONS</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.studentDto != null ? r.studentDto.name : ''}"></td>
                <td th:text="${r.placeDto != null ? r.placeDto.building + ' - ' + r.placeDto.room: ''}"></td>
                <td th:text="${r.date}"></td>
                <td th:text="${r.duration}"></td>
                <td>
                    <i th:if="${!r.reserved}" class="bi bi-check-circle-fill text-success fs-5" title="Available"></i>
                    <i th:if="${r.reserved}" class="bi bi-x-circle-fill text-danger fs-5" title="Reserved"></i>
                </td>
                <td>
                    <a href="#" th:onclick="'javascript:Details('+${r.id}+');'" class="btn btn-info"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Details"><i
                            class="bi bi-info-circle"></i></a>
                    <a href="#" th:onclick="'javascript:Update('+${r.id}+');'" class="btn btn-warning"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Update"><i
                            class="bi bi-pencil"></i></a>
                    <a href="#" th:onclick="'javascript:Delete('+${r.id}+');'" class="btn btn-danger"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Delete"><i
                            class="bi bi-trash"></i></a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
    // Tooltip initialize
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

    function AddReservation() {
        console.log('Adding Reservation');
        $.ajax({
            url: '/reservation/add',
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function () {
                alert("Problem add user");
            }
        });
    }

    function Details(id) {
        $.ajax({
            url: '/reservation/'+ id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function () {
                alert("Problem on details!");
            }
        });
    }

    function Update(id) {
        $.ajax({
            url: '/reservation/update/'+id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function () {
                alert("Problem update");
            }
        });
    }

    function Delete(id) {
        if (!confirm("The selected user will be deleted! \nAre you sure?")) return;
        $.ajax({
            url: '/reservation/delete/' + id,
            type: 'delete',
            success: function (data) {
                //alert("Ok");
                window.location.replace("/reservation/all");
            },
            error: function (r) {
                if (r.status === 403) {
                    var redirect = r.getResponseHeader('X-Redirect-URL');
                    if (redirect) {
                        window.location.replace(redirect);
                    } else {
                        window.location.replace('/403');
                    }
                } else {
                    alert("Delete user problem: " + (r.responseText || r.statusText));
                }
            }
        });
    }
</script>
</body>
</html>
