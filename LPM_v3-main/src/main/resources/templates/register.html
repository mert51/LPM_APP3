<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - LPM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="min-height: 100vh;">

<main class="w-100 m-auto" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">Create an Account</h2>

            <form th:action="@{/register}" th:object="${student}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" th:field="*{department}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Profile Picture (Optional)</label>
                    <input class="form-control" type="file" th:field="*{imageFile}" accept="image/png, image/jpeg">
                    <div class="form-text text-muted">Max file size: 5MB</div>
                </div>

                <button class="w-100 btn btn-lg btn-success" type="submit">Register</button>

                <div class="text-center mt-3">
                    <a th:href="@{/login}" class="text-decoration-none">Already have an account? Sign in</a>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
