<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - LPM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="min-height: 100vh;">

<main class="text-center w-100 m-auto" style="max-width: 400px;">
    <form th:action="@{/login}" method="post" class="card shadow-sm p-4">
        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid username or password.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            Registration successful! Please sign in.
        </div>

        <div class="form-floating mb-2">
            <input type="text" name="username" class="form-control" id="floatingInput" placeholder="Username" required autofocus>
            <label for="floatingInput">Username</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
            <label for="floatingPassword">Password</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary mb-3" type="submit">Sign in</button>

        <a th:href="@{/register}" class="text-decoration-none">Don't have an account? Register</a>
    </form>
</main>

</body>
</html>
