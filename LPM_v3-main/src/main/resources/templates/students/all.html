<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:width="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>All Students</title>
</head>
<body>
<div id="modal-tag"></div>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Card beginning -->
<div class="card mx-auto mt-5" style="max-width: 1000px;">
    <div class="card-header">
        All Students
    </div>
    <div class="card-body">
        <button type="button" onclick="AddStudent()" class="w-100 btn btn-md btn-outline-primary"
                sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus-fill"></i>&nbsp;Add Student
        </button>

        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>PICTURE</th>
                <th>NAME</th>
                <th>USERNAME</th>
                <th>DEPARTMENT</th>
                <th>ROLE</th>
                <th>OPERATIONS</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s:${students}">
                <td th:text="${s.id}"></td>
                <td>
                    <img th:src="@{${s.imageURL != null ? s.imageURL : '/images/lpm.png'}}"
                         class="rounded-circle border"
                         style="width: 50px; height: 50px; object-fit: cover;">
                </td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.username}"></td>
                <td th:text="${s.department}"></td>
                <td>
                    <span th:class="${s.role.name() == 'ADMIN' ? 'badge bg-primary' : 'badge bg-secondary'}"
                          th:text="${s.role}"></span>
                </td>
                <td>
                    <a href="#" th:onclick="'javascript:Details('+${s.id}+');'" class="btn btn-info"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Details"><i
                            class="bi bi-info-circle"></i></a>
                    <a href="#" th:onclick="'javascript:Update('+${s.id}+');'" class="btn btn-warning"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Update"><i
                            class="bi bi-pencil"></i></a>
                    <a href="#" th:onclick="'javascript:Delete('+${s.id}+');'" class="btn btn-danger"
                       data-bs-toggle="tooltip" data-bs-placement="bottom" title="Delete"><i
                            class="bi bi-trash"></i></a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
    // Tooltip initialize
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

    function AddStudent() {
        console.log('Adding Student');
        $.ajax({
            url: '/student/add',
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem add user");
            }
        });
    }

    function Details(id) {
        $.ajax({
            url: '/student/'+ id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem on details!");
            }
        });
    }

    function Update(id) {
        $.ajax({
            url: '/student/update/'+id,
            type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                alert("Problem update");
            }
        });
    }

    function Delete(id) {
        if (!confirm("The selected user will be deleted! \nAre you sure?")) return;
        $.ajax({
            url: '/student/delete/' + id,
            type: 'delete',
            success: function (data) {
                //alert("Ok");
                window.location.replace("/student/all");
            },
            error: function (r) {
                alert("Delete user problem: " + r.responseText);
            }
        });
    }
</script>
</body>
</html>
