<div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="addStudentModalLabel" aria-hidden="true"
     xmlns:sec="http://www.w3.org/1999/xhtml">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addStudentModalLabel">Add New Student</h5>
                <!-- Closing Button -->
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <form th:action="@{/student/add}" th:object="${student}" method="post" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label for="imageFile" class="form-label">Profile Picture (Image Upload)</label>
                        <input class="form-control" type="file" id="imageFile" th:field="*{imageFile}" accept="image/png, image/jpeg">
                        <div class="form-text text-muted">Max file size: 5MB (Default Spring)</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>

                    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
                        <label class="form-label">Role</label>
                        <select th:field="*{role}" class="form-select">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <input type="hidden" sec:authorize="!hasRole('ADMIN')" th:field="*{role}" />

                    <div class="mb-3">
                        <label for="name" class="form-label">Student Name</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" id="department" required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
